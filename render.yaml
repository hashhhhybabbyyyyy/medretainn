services:
  - type: web
    name: medretain-crm-backend
    env: python
    plan: free
    region: oregon
    branch: main
    repo: https://github.com/hashhhhybabbyyyyy/medretainn

    # Build configuration
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: sh -c 'cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT'

    # Environment variables
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./medretain.db
      - key: JWT_SECRET_KEY
        value: medretain-crm-production-secret-key-2026-change-me
      - key: JWT_EXPIRE_MINUTES
        value: "480"
      - key: ENCRYPTION_KEY
        value: medretain-encryption-key-32-bytes-long-for-fernet-encryption
      - key: ENVIRONMENT
        value: production

    healthCheckPath: /health
    healthCheckInterval: 30

  - type: web
    name: medretain-messaging-backend
    env: node
    plan: free
    region: oregon
    branch: main
    repo: https://github.com/hashhhhybabbyyyyy/medretainn

    # Build configuration
    buildCommand: cd messaging-service && npm install
    startCommand: cd messaging-service && npm start

    # Environment variables
    envVars:
      - key: TWILIO_ACCOUNT_SID
        value: YOUR_ACCOUNT_SID
      - key: TWILIO_AUTH_TOKEN
        value: YOUR_AUTH_TOKEN
      - key: TWILIO_WHATSAPP_FROM
        value: whatsapp:+YOUR_TWILIO_NUMBER
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://medretainn.vercel.app

    # Health check
    healthCheckPath: /health
    healthCheckInterval: 30
